<svg width="600" height="400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#000000;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#grad2)"/>
  
  <!-- Component parts illustration -->
  <g transform="translate(100, 60)">
    <!-- Valve -->
    <circle cx="100" cy="80" r="25" fill="#FF6600" opacity="0.8"/>
    <rect x="90" y="100" width="20" height="30" fill="#FF6600" opacity="0.7"/>
    
    <!-- Bolts -->
    <circle cx="50" cy="60" r="8" fill="#999999"/>
    <circle cx="150" cy="60" r="8" fill="#999999"/>
    <circle cx="50" cy="140" r="8" fill="#999999"/>
    <circle cx="150" cy="140" r="8" fill="#999999"/>
    
    <!-- Mold part -->
    <rect x="60" y="180" width="80" height="60" fill="#FF6600" opacity="0.6" rx="3"/>
    <line x1="65" y1="185" x2="135" y2="185" stroke="#FFFFFF" stroke-width="2" opacity="0.4"/>
    <line x1="65" y1="200" x2="135" y2="200" stroke="#FFFFFF" stroke-width="2" opacity="0.4"/>
    <line x1="65" y1="215" x2="135" y2="215" stroke="#FFFFFF" stroke-width="2" opacity="0.4"/>
  </g>
</svg>