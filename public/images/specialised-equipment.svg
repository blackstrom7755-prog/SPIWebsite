<svg width="600" height="400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#000000;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#grad1)"/>
  
  <!-- Machine parts illustration -->
  <g transform="translate(150, 80)">
    <!-- Main body -->
    <rect x="50" y="60" width="100" height="120" fill="#FF6600" opacity="0.8" rx="5"/>
    
    <!-- Side components -->
    <rect x="20" y="100" width="30" height="60" fill="#FF6600" opacity="0.6" rx="3"/>
    <rect x="150" y="100" width="30" height="60" fill="#FF6600" opacity="0.6" rx="3"/>
    
    <!-- Top interface -->
    <circle cx="80" cy="50" r="15" fill="#FF6600" opacity="0.7"/>
    <circle cx="120" cy="50" r="15" fill="#FF6600" opacity="0.7"/>
    
    <!-- Bottom base -->
    <rect x="40" y="190" width="120" height="15" fill="#999999" rx="3"/>
    
    <!-- Details -->
    <rect x="70" y="75" width="50" height="40" fill="none" stroke="#FFFFFF" stroke-width="2" opacity="0.5"/>
  </g>
</svg>